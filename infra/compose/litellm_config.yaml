model_list:
  - model_name: "hiqonis-default"
    litellm_params:
      model: "ollama/llama3.1"
      api_base: "http://host.docker.internal:11434"
  - model_name: "hiqonis-default"
    litellm_params:
      model: "gemini/gemini-2.5-flash"
      api_key: "os.environ/GEMINI_API_KEY"
  - model_name: "hiqonis-premium"
    litellm_params:
      model: "openai/gpt-4o"
      api_key: "os.environ/OPENAI_API_KEY"

router_settings:
  routing_strategy: "latency-optimized"
  num_retries: 2
  fallbacks: [{"hiqonis-default": ["hiqonis-premium"]}]
