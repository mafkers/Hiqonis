openapi: 3.1.0
info:
  title: Hiqonis API
  version: 0.1.0
  description: Enterprise-grade, open-source AI Agent Customer Experience (CX) platform API.
servers:
  - url: http://localhost:8000/api/v1
    description: Local Development Server
paths:
  /conversations:
    post:
      summary: Create a new conversation session
      operationId: createConversation
      tags:
        - conversations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversationRequest'
      responses:
        '201':
          description: Conversation created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
        '422':
          description: Validation Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

    get:
      summary: List all conversations for a tenant
      operationId: listConversations
      tags:
        - conversations
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of conversations retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Conversation'

  /conversations/{conversation_id}:
    get:
      summary: Retrieve specific conversation details
      operationId: getConversation
      tags:
        - conversations
      parameters:
        - name: conversation_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Detailed conversation information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
        '404':
          description: Conversation not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /conversations/{conversation_id}/messages:
    post:
      summary: Send a message in a conversation session
      operationId: sendMessage
      tags:
        - conversations
      parameters:
        - name: conversation_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '200':
          description: Message sent successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '404':
          description: Conversation not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

components:
  schemas:
    CreateConversationRequest:
      type: object
      required:
        - tenant_id
      properties:
        channel:
          type: string
          default: web
          enum: [web, whatsapp, instagram, email]
        tenant_id:
          type: string

    SendMessageRequest:
      type: object
      required:
        - sender_id
        - sender_type
        - content
      properties:
        sender_id:
          type: string
        sender_type:
          type: string
          enum: [user, agent, system, ai]
        content:
          type: string

    Message:
      type: object
      required:
        - id
        - sender_id
        - sender_type
        - content
        - timestamp
      properties:
        id:
          type: string
        sender_id:
          type: string
        sender_type:
          type: string
        content:
          type: string
        timestamp:
          type: string
          format: date-time

    Conversation:
      type: object
      required:
        - id
        - tenant_id
        - status
        - channel
        - created_at
      properties:
        id:
          type: string
        tenant_id:
          type: string
        status:
          type: string
          enum: [open, snoozed, resolved]
        channel:
          type: string
        created_at:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'

    ProblemDetails:
      type: object
      required:
        - type
        - title
        - status
        - detail
        - instance
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
